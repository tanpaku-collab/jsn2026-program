  const prefOrder = [
    '北海道','青森県','岩手県','宮城県','秋田県','山形県','福島県',
    '茨城県','栃木県','群馬県','埼玉県','千葉県','東京都','神奈川県',
    '新潟県','富山県','石川県','福井県','山梨県','長野県','岐阜県',
    '静岡県','愛知県','三重県','滋賀県','京都府','大阪府','兵庫県',
    '奈良県','和歌山県','鳥取県','島根県','岡山県','広島県','山口県',
    '徳島県','香川県','愛媛県','高知県','福岡県','佐賀県','長崎県',
    '熊本県','大分県','宮崎県','鹿児島県','沖縄県',
  ];
  const sortedPrefs = [...prefSet].sort((a, b) => {
    const ia = prefOrder.indexOf(a), ib = prefOrder.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1; if (ib === -1) return -1;
    return ia - ib;
  });
  buildPrefCheckboxes(sortedPrefs, hasUnmatched);
}

function loadStats() {
  const count = (window.PRESENTATIONS_DATA || []).length;
  document.getElementById('stats-bar').textContent = '演題 ' + count + '件';
}

function populateSelect(id, options) {
  const sel = document.getElementById(id);
  options.forEach(({ value, label }) => {
    const opt = document.createElement('option');
    opt.value = value; opt.textContent = label;
    sel.appendChild(opt);
  });
}

// ============================================================
// 検索（クライアントサイドフィルタリング）
// ============================================================
function search() {
  showLoading(true);
  const q = val('filter-q');
  const date = val('filter-date');
  const prefs = getSelectedPrefectures();
  const presenter = val('filter-presenter');

  let results = window.PRESENTATIONS_DATA || [];

  if (q) {
    const keyword = q.toLowerCase();
    results = results.filter(p =>
      p.title.toLowerCase().includes(keyword) ||
      p.sessionName.toLowerCase().includes(keyword) ||
      p.presenters.some(pr =>
        pr.name.toLowerCase().includes(keyword) ||
        (pr.affiliationRaw || '').toLowerCase().includes(keyword)
      )
    );
  }
  if (date) results = results.filter(p => p.date === date);
  if (prefs.length > 0) {
    results = results.filter(p =>
      p.presenters.some(pr => {
        if (prefs.includes('未照合') && (!pr.prefecture || pr.prefecture === '不明')) return true;
        return pr.prefecture && prefs.includes(extractPrefecture(pr.prefecture));
      })
    );
  }
  if (presenter) {
    const name = presenter.toLowerCase();
    results = results.filter(p => p.presenters.some(pr => pr.name.toLowerCase().includes(name)));
  }

  results = [...results].sort((a, b) => {
    const da = a.date ?? '', db = b.date ?? '';
    if (da !== db) return da.localeCompare(db);
    const ta = a.startTime ?? '', tb = b.startTime ?? '';
    if (ta !== tb) return ta.localeCompare(tb);
    return roomNumber(a.room) - roomNumber(b.room);
  });

  currentPresentations = results;
  renderResults(results, results.length);
  showLoading(false);
}

// ============================================================
// 結果レンダリング
// ============================================================
function renderResults(presentations, count) {
  const container = document.getElementById('results');
  const empty = document.getElementById('empty');
  document.getElementById('result-count').textContent = count + '件の演題が見つかりました';

  if (presentations.length === 0) {
    container.innerHTML = ''; empty.classList.remove('hidden'); return;
  }
  empty.classList.add('hidden');
  const byDate = groupBy(presentations, p => p.date ?? '日付不明');
  container.innerHTML = Object.entries(byDate)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([date, preses]) => `
      <div>
        <div class="flex items-center gap-3 mb-2 sticky top-12 sm:top-16 z-10">
          <div class="bg-brand-700 text-white text-sm font-bold px-4 py-1.5 rounded-full shadow">${formatDate(date)}</div>
          <div class="flex-1 h-px bg-brand-200"></div>
          <span class="text-xs text-gray-400">${preses.length}件</span>
        </div>
        <div class="space-y-2">${preses.map(p => renderCard(p)).join('')}</div>
      </div>
    `).join('');
}

function renderCard(p, conflicts = new Set()) {
  const timeStr = [p.startTime, p.endTime].filter(Boolean).join('–') || '時間不明';
  const roomStr = p.room ? '<span class="text-gray-400">｜</span> ' + escHtml(shortRoom(p.room)) : '';
  const inSchedule = mySchedule.has(p.id);
  const hasConflict = conflicts.has(p.id);

  const presenterHtml = p.presenters.map(pr => {
    const badge = matchBadge(pr.matchMethod);
    const loc = [pr.prefecture, pr.city].filter(Boolean).join(' ');
    const affil = escHtml(pr.affiliationNormalized || pr.affiliationRaw || '');
    return `<span class="inline-flex items-center gap-1 flex-wrap">
      <span class="font-medium text-gray-800 text-sm">${escHtml(pr.name)}</span>
      ${badge}
      ${loc ? '<span class="text-xs text-gray-500 whitespace-nowrap">' + escHtml(loc) + '</span>' : ''}
      ${affil ? '<span class="text-xs text-gray-400 break-words">(' + affil + ')</span>' : ''}
    </span>`;
  }).join('<span class="text-gray-300 mx-1">·</span>');

  const borderClass = hasConflict ? 'border-red-300 bg-red-50' : inSchedule ? 'border-yellow-300 bg-yellow-50' : 'border-gray-200 bg-white';
  return `
    <div class="${borderClass} border rounded-xl p-3 sm:p-4 card-hover overflow-hidden" data-id="${p.id}">
      <div class="flex items-start gap-2">
        <button data-schedule-btn="${p.id}" onclick="toggleSchedule('${p.id}')"
          title="${inSchedule ? 'スケジュールから削除' : 'マイスケジュールに追加'}"
          class="schedule-btn ${inSchedule ? 'text-yellow-400 hover:text-yellow-500' : 'text-gray-300 hover:text-yellow-400'} text-lg leading-none mt-0.5 flex-shrink-0 transition-colors">
          ${inSchedule ? '★' : '☆'}
        </button>
        <div class="flex-1 min-w-0">
          <div class="flex flex-wrap items-start gap-x-3 gap-y-1 mb-2">
            <span class="text-xs font-mono bg-gray-100 text-gray-600 px-2 py-0.5 rounded">${escHtml(p.presentationNumber ?? '')}</span>
            <span class="text-xs text-brand-500 font-medium">${escHtml(p.sessionName)}</span>
            <span class="text-xs text-gray-400">${timeStr} ${roomStr}</span>
            ${hasConflict ? '<span class="text-xs text-red-500 font-medium">⚠️ 時間が重複</span>' : ''}
          </div>
          <p class="text-sm font-semibold text-gray-800 leading-snug mb-2 break-words">${escHtml(p.title)}</p>
          <div class="text-sm flex flex-wrap items-center gap-1.5">
            <span class="text-xs text-gray-400">演者：</span>
            ${presenterHtml || '<span class="text-xs text-gray-300">（演者情報なし）</span>'}
          </div>
        </div>
      </div>
    </div>
  `;
}

function matchBadge(_method) { return ''; }

// ============================================================
// マイスケジュール
// ============================================================
function saveSchedule() { localStorage.setItem('mySchedule', JSON.stringify([...mySchedule])); }

function toggleSchedule(id) {
  if (mySchedule.has(id)) mySchedule.delete(id); else mySchedule.add(id);
  saveSchedule(); updateScheduleCount();
  if (isScheduleView) { renderScheduleView(); } else {
    const btn = document.querySelector('[data-schedule-btn="' + id + '"]');
    if (btn) applyScheduleBtnStyle(btn, mySchedule.has(id));
  }
}

function applyScheduleBtnStyle(btn, active) {
  btn.textContent = active ? '★' : '☆';
  btn.className = 'schedule-btn ' + (active ? 'text-yellow-400 hover:text-yellow-500' : 'text-gray-300 hover:text-yellow-400') + ' text-lg leading-none transition-colors';
}

function updateScheduleCount() {
  const cnt = mySchedule.size;
  const badge = document.getElementById('schedule-count');
  if (cnt > 0) { badge.textContent = cnt; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');
}

function clearAllSchedule() {
  if (!confirm('マイスケジュールの' + mySchedule.size + '件をすべて解除しますか？')) return;
  mySchedule.clear(); saveSchedule(); updateScheduleCount(); renderScheduleView();
}

function toggleScheduleView() {
  isScheduleView = !isScheduleView;
  const btn = document.getElementById('btn-schedule');
  const resultsEl = document.getElementById('results');
  const scheduleEl = document.getElementById('schedule-view');
  if (isScheduleView) {
    btn.style.background = '#c8a84b'; btn.style.color = '#0d2355'; btn.style.border = 'none';
    resultsEl.classList.add('hidden'); scheduleEl.classList.remove('hidden');
    renderScheduleView();
  } else {
    btn.style.background = 'rgba(255,255,255,0.1)'; btn.style.color = 'white'; btn.style.border = '1px solid rgba(255,255,255,0.25)';
    resultsEl.classList.remove('hidden'); scheduleEl.classList.add('hidden');
  }
}

function renderScheduleView() {
  const container = document.getElementById('schedule-results');
  const emptyEl = document.getElementById('schedule-empty');
  const summaryEl = document.getElementById('schedule-summary');
  const allPres = window._allPresentations || [];
  const selected = allPres.filter(p => mySchedule.has(p.id));

  if (selected.length === 0) {
    container.innerHTML = ''; emptyEl.classList.remove('hidden');
    summaryEl.textContent = '0件選択中'; return;
  }
  emptyEl.classList.add('hidden');
  const conflicts = detectConflicts(selected);
  summaryEl.textContent = selected.length + '件選択中' + (conflicts.size > 0 ? '・⚠️ ' + conflicts.size + '件の時間が重複' : '・時間の重複なし ✓');

  const byDate = groupBy(selected, p => p.date ?? '日付不明');
  container.innerHTML = Object.entries(byDate)
    .sort(([a], [b]) => a.localeCompare(b))
    .map(([date, preses]) => {
      const sorted = [...preses].sort((a, b) => (a.startTime ?? '').localeCompare(b.startTime ?? ''));
      return `<div>
        <div class="flex items-center gap-3 mb-2 sticky top-12 sm:top-16 z-10">
          <div class="bg-brand-700 text-white text-sm font-bold px-4 py-1.5 rounded-full shadow">${formatDate(date)}</div>
          <div class="flex-1 h-px bg-brand-200"></div>
          <span class="text-xs text-gray-400">${sorted.length}件</span>
        </div>
        <div class="space-y-2">${sorted.map(p => renderCard(p, conflicts)).join('')}</div>
      </div>`;
    }).join('');
}

function detectConflicts(presentations) {
  const conflicts = new Set();
  const wt = presentations.filter(p => p.date && p.startTime && p.endTime);
  for (let i = 0; i < wt.length; i++) for (let j = i + 1; j < wt.length; j++) {
    const a = wt[i], b = wt[j];
    if (a.date !== b.date) continue;
    if (a.startTime < b.endTime && b.startTime < a.endTime) { conflicts.add(a.id); conflicts.add(b.id); }
  }
  return conflicts;
}

// ============================================================
// 都道府県チェックボックス
// ============================================================
function buildPrefCheckboxes(prefs, hasUnmatched) {
  const container = document.getElementById('pref-checkboxes');
  const unmatchedHtml = hasUnmatched ? `
    <label class="flex items-center gap-1.5 cursor-pointer hover:bg-gray-50 rounded px-1 py-0.5 col-span-2 border-t border-gray-100 mt-1 pt-1.5">
      <input type="checkbox" class="pref-cb rounded border-gray-300 w-3.5 h-3.5 cursor-pointer" value="未照合">
      <span class="text-xs text-gray-500 italic">未照合</span>
    </label>` : '';
  container.innerHTML = prefs.map(p => `
    <label class="flex items-center gap-1.5 cursor-pointer hover:bg-gray-50 rounded px-1 py-0.5">
      <input type="checkbox" class="pref-cb rounded border-gray-300 w-3.5 h-3.5 cursor-pointer" value="${escHtml(p)}">
      <span class="text-xs text-gray-700">${escHtml(p)}</span>
    </label>`).join('') + unmatchedHtml;
  container.addEventListener('change', () => { updatePrefLabel(); search(); });
}

function getSelectedPrefectures() { return [...document.querySelectorAll('.pref-cb:checked')].map(cb => cb.value); }
function clearPrefCheckboxes() { document.querySelectorAll('.pref-cb').forEach(cb => { cb.checked = false; }); updatePrefLabel(); }
function updatePrefLabel() {
  const selected = getSelectedPrefectures();
  const label = document.getElementById('pref-label');
  if (selected.length === 0) { label.textContent = 'すべての都道府県'; label.className = 'text-gray-400'; }
  else { label.textContent = selected.length <= 3 ? selected.join('・') : selected.length + '都道府県選択中'; label.className = 'text-gray-800 font-medium'; }
}

document.getElementById('pref-toggle').addEventListener('click', e => { e.stopPropagation(); document.getElementById('pref-panel').classList.toggle('hidden'); });
document.getElementById('pref-clear-all').addEventListener('click', e => { e.stopPropagation(); clearPrefCheckboxes(); search(); });
document.addEventListener('click', e => { if (!document.getElementById('pref-wrap').contains(e.target)) document.getElementById('pref-panel').classList.add('hidden'); });

// ============================================================
// イベント
// ============================================================
document.getElementById('btn-search').addEventListener('click', search);
document.getElementById('btn-clear').addEventListener('click', () => {
  ['filter-q','filter-presenter'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('filter-date').selectedIndex = 0;
  clearPrefCheckboxes(); search();
});
['filter-q','filter-presenter'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
});
document.getElementById('filter-date').addEventListener('change', search);

// ============================================================
// ユーティリティ
// ============================================================
function val(id) { return document.getElementById(id)?.value?.trim() ?? ''; }
function showLoading(show) {
  document.getElementById('loading').classList.toggle('hidden', !show);
  if (show) { document.getElementById('results').innerHTML = ''; document.getElementById('empty').classList.add('hidden'); }
}
function formatDate(d) {
  if (!d) return '日付不明';
  const m = d.match(/^(\d{2})-(\d{2})$/);
  if (m) return parseInt(m[1]) + '月' + parseInt(m[2]) + '日';
  return d;
}
function shortRoom(room) {
  const m = room.match(/^(第0*(\d+)会場|ポスター会場)/);
  if (m) return m[1].replace('第0','第');
  return room.substring(0, 15);
}
function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function groupBy(arr, fn) {
  return arr.reduce((acc, item) => { const k = fn(item); (acc[k] = acc[k] || []).push(item); return acc; }, {});
}

init();

</script>
